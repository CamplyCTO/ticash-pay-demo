services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticash
      POSTGRES_PASSWORD: ticash
      POSTGRES_DB: ticash
    ports:
      - "5432:5432"
    volumes:
      - ticash_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticash"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ticash_pgdata:
